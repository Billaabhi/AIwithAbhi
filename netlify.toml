[build]
  base    = "apps/web"
  command = "cd ../.. && corepack enable && pnpm install && pnpm --filter=@aiwithabhi/types build && pnpm --filter=@aiwithabhi/web build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.1.0"

[[plugins]]
  package = "@netlify/plugin-nextjs"
